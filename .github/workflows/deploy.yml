name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Navigate to the project directory on your server
            cd /var/www/Solid-Waste-Management-System
            
            # 2. Pull the latest code from the main branch
            git pull origin main
            
            # 3. Build and restart only the database container first
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d db
            
            # Wait for PostgreSQL to be ready
            sleep 5
            
            # 4. Create database if it doesn't exist
            docker compose exec -T db psql -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'wastemanagement'" | grep -q 1 || docker compose exec -T db createdb -U postgres wastemanagement
            
            # 5. Build and start the web container
            # (This will automatically run collectstatic and migrate internally per docker-compose.prod.yml)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build web
